es:
  date:
    formats:
      default: "%d/%m/%Y"
      long: "%A %d de %B, %Y"
      short: "%d %b"
    day_names:
      - Domingo
      - Lunes
      - Martes
      - Miércoles
      - Jueves
      - Viernes
      - Sábado
    abbr_day_names:
      - Dom
      - Lun
      - Mar
      - Mié
      - Jue
      - Vie
      - Sáb
    month_names:
      - ~
      - Enero
      - Febrero
      - Marzo
      - Abril
      - Mayo
      - Junio
      - Julio
      - Agosto
      - Septiembre
      - Octubre
      - Noviembre
      - Diciembre
    abbr_month_names:
      - ~
      - Ene
      - Feb
      - Mar
      - Abr
      - May
      - Jun
      - Jul
      - Ago
      - Sep
      - Oct
      - Nov
      - Dic
  time:
    formats:
      default: "%H:%M"
      long: "%A %d de %B de %Y %H:%M"
      short: "%d %b %H:%M"
  activerecord:
    errors:
      messages:
        record_invalid: "La validación falló: %{errors}"
        restrict_dependent_destroy:
          has_one: "No se puede eliminar porque existe un %{record} dependiente"
          has_many: "No se puede eliminar porque existen %{record} dependientes"
  errors:
    format: "%{attribute} %{message}"
    messages:
      blank: "no puede estar en blanco"
      present: "debe estar en blanco"
      taken: "ya está en uso"
      invalid: "no es válido"
      too_short: "es demasiado corto (mínimo %{count} caracteres)"
      too_long: "es demasiado largo (máximo %{count} caracteres)"
      not_a_number: "no es un número"
      greater_than: "debe ser mayor que %{count}"
      greater_than_or_equal_to: "debe ser mayor o igual a %{count}"
      less_than_or_equal_to: "debe ser menor o igual a %{count}"
      inclusion: "no está incluido en la lista"
